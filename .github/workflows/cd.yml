name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Build Linux exe for Docker
        run: scripts/buildprod.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          version: '>= 363.0.0'

      - name: 'Run DB migrations'
        run: 'scripts/migrateup.sh'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: build the Docker image and push it to Google Artifact Registry
        run: gcloud builds submit --tag europe-west2-docker.pkg.dev/notely-489811/notely-ar-repo/'micro_notely:latest' .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-west2-docker.pkg.dev/notely-489811/notely-ar-repo/'micro_notely:latest' --region europe-west2 --allow-unauthenticated --project notely-489811 --max-instances=4
